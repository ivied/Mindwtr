services:
  mindwtr-cloud:
    build:
      context: ..
      dockerfile: docker/cloud/Dockerfile
    image: gtd-automation-cloud:local
    container_name: mindwtr-cloud
    hostname: mindwtr-cloud
    restart: always
    cpus: "1.0"
    mem_limit: 512m
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8787/health >/dev/null || exit 1"]
      interval: 1m30s
      timeout: 10s
      retries: 3
      start_period: 30s
    ports:
      - 8787:8787
    environment:
      - MINDWTR_CLOUD_AUTH_TOKENS=${MINDWTR_CLOUD_AUTH_TOKENS:?MINDWTR_CLOUD_AUTH_TOKENS must be set}
      - MINDWTR_CLOUD_ALLOW_ANY_TOKEN=${MINDWTR_CLOUD_ALLOW_ANY_TOKEN:-false}
      - MINDWTR_CLOUD_CORS_ORIGIN=${MINDWTR_CLOUD_CORS_ORIGIN:-http://localhost:5173}
      - MINDWTR_CLOUD_MAX_BODY_BYTES=${MINDWTR_CLOUD_MAX_BODY_BYTES:-20000000}
      # Fire-and-forget webhook to ai-service on user-originated task edits/deletes
      # so implicit Proposal signals (approved-by-edit, superseded, etc.) fire.
      # Suppressed when the request carries X-Mindwtr-Source: ai-service.
      - MINDWTR_TASK_WEBHOOK_URL=${MINDWTR_TASK_WEBHOOK_URL:-http://ai-service:3030/v1/proposals/task-changes}
      - MINDWTR_TASK_WEBHOOK_TOKEN=${MINDWTR_TASK_WEBHOOK_TOKEN:-${HTTP_AUTH_TOKEN:-}}
    volumes:
      - ./data:/app/cloud_data

  mindwtr-app:
    image: gtd-automation-app:local
    build:
      context: ..
      dockerfile: docker/app/Dockerfile
      args:
        VITE_AI_SERVICE_URL: ${VITE_AI_SERVICE_URL:-https://ai.kurdy.uk}
        VITE_AI_SERVICE_TOKEN: ${HTTP_AUTH_TOKEN:-}
        VITE_CLOUD_URL: ${VITE_CLOUD_URL:-https://api.kurdy.uk}
        VITE_CLOUD_TOKEN: ${MINDWTR_CLOUD_AUTH_TOKENS:-}
    container_name: mindwtr-app
    hostname: mindwtr-app
    restart: always
    cpus: "1.0"
    mem_limit: 512m
    depends_on:
      mindwtr-cloud:
        condition: service_healthy
    ports:
      - 5173:5173

  ai-service:
    build:
      context: ..
      dockerfile: docker/ai-service/Dockerfile
    container_name: ai-service
    hostname: ai-service
    restart: always
    cpus: "1.0"
    mem_limit: 512m
    depends_on:
      mindwtr-cloud:
        condition: service_healthy
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:?TELEGRAM_BOT_TOKEN must be set}
      - MINDWTR_CLOUD_URL=http://mindwtr-cloud:8787
      - MINDWTR_AUTH_TOKEN=${MINDWTR_CLOUD_AUTH_TOKENS}
      - LLM_BASE_URL=${LLM_BASE_URL:-}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-cc/claude-opus-4-6}
      - SLACK_APP_TOKEN=${SLACK_APP_TOKEN:-}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN:-}
      - NOTION_API_KEY=${NOTION_API_KEY:-}
      - NOTION_DATABASE_ID=${NOTION_DATABASE_ID:-}
      - NOTION_POLL_INTERVAL_MS=${NOTION_POLL_INTERVAL_MS:-300000}
      - HTTP_PORT=${HTTP_PORT:-3030}
      - HTTP_AUTH_TOKEN=${HTTP_AUTH_TOKEN:-}
      - HTTP_CORS_ORIGINS=${HTTP_CORS_ORIGINS:-http://localhost:5173}
      # TG chat that receives push notifications about new proposals.
      # Empty disables push (in-app + /proposals command still work).
      - TG_NOTIFY_CHAT_ID=${TG_NOTIFY_CHAT_ID:-}
      # Mindwtr web UI base URL — used for deep-links from TG cards.
      - MINDWTR_WEB_URL=${MINDWTR_WEB_URL:-http://localhost:5173}
      # User identity for Proposer role disambiguation. Empty disables anchor.
      - USER_IDENTITY_NAME=${USER_IDENTITY_NAME:-}
      - USER_IDENTITY_ALIASES=${USER_IDENTITY_ALIASES:-}
      # Path inside container to the capture-wiki root. Empty disables the
      # persons registry feed into Proposer (who_to stays as literal OCR).
      - WIKI_DIR=${WIKI_DIR:-/app/wiki}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - EMBEDDINGS_MODEL=${EMBEDDINGS_MODEL:-text-embedding-3-small}
      - CONTEXT_STORE_TTL_DAYS=${CONTEXT_STORE_TTL_DAYS:-7}
      - DATA_DIR=/app/data
      # Procedural memory (FR85). Path inside the container; empty
      # disables the KNOWN_PLAYBOOK block. See docker/cloud-prod/
      # sync-shared-memory.sh for the rsync that populates the host dir.
      - SHARED_MEMORY_DIR=${SHARED_MEMORY_DIR:-/app/shared-memory}
      - SHARED_MEMORY_REINDEX_INTERVAL_MS=${SHARED_MEMORY_REINDEX_INTERVAL_MS:-60000}
    ports:
      - "${HTTP_PORT:-3030}:3030"
    volumes:
      - ./ai-service-data:/app/data
      # Read-only mount of the capture-wiki root so the Proposer can read
      # wiki/entities/*.md for the KNOWN_PERSONS registry. Path is the user's
      # local wiki dir; override WIKI_HOST_DIR when the wiki lives elsewhere.
      - ${WIKI_HOST_DIR:-/Users/sergeykurdyuk/Projects/GTD_automation/wiki}:/app/wiki:ro
      # Read-only mount of the shared procedural memory mirror (FR85).
      # Initially populated by docker/cloud-prod/sync-shared-memory.sh from
      # OpenClaw via Tailscale. Override SHARED_MEMORY_HOST_DIR if the
      # mirror lives elsewhere. Empty/missing dir is fine — the reader
      # silently no-ops until a source subdir appears.
      - ${SHARED_MEMORY_HOST_DIR:-/Users/sergeykurdyuk/shared-memory}:/app/shared-memory:ro

  # Cloudflare Tunnel — outbound-only connector to CF edge. Routes
  # configured in CF dashboard at one.dash.cloudflare.com → Zero Trust →
  # Networks → Tunnels → gtd-prod → Public Hostnames:
  #   gtd.kurdy.uk      → http://mindwtr-app:5173
  #   api.gtd.kurdy.uk  → http://mindwtr-cloud:8787
  #   ai.gtd.kurdy.uk   → http://ai-service:3030
  # No host ports exposed; cloudflared joins docker_default to resolve the
  # other services by their compose service names.
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared-gtd
    restart: unless-stopped
    cpus: "0.5"
    mem_limit: 256m
    profiles: ["cf"]   # opt-in: start with `docker compose --profile cf up -d`
    # Token passed as CLI arg (newer cloudflared releases ignore TUNNEL_TOKEN
    # env in some images). Provide via env at compose time, e.g.
    #   CLOUDFLARE_TUNNEL_TOKEN=$(op read "op://Private/Cloudflare Tunnel gtd-prod (sergey)/password" --account ivied) \
    #     docker compose --profile cf up -d cloudflared
    # --protocol http2: QUIC (UDP/7844) is unreliable on residential
    # routers — symptom is repeating "failed to dial to edge with quic:
    # timeout: no recent network activity". HTTP/2 falls back to TCP/443
    # which survives NAT / network changes / Mac sleep far better.
    command: tunnel --no-autoupdate run --protocol http2 --token ${CLOUDFLARE_TUNNEL_TOKEN:-}
