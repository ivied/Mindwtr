services:
  mindwtr-cloud:
    image: ghcr.io/dongdongbh/mindwtr-cloud:latest
    build:
      context: ..
      dockerfile: docker/cloud/Dockerfile
    container_name: mindwtr-cloud
    hostname: mindwtr-cloud
    restart: always
    cpus: "1.0"
    mem_limit: 512m
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8787/health >/dev/null || exit 1"]
      interval: 1m30s
      timeout: 10s
      retries: 3
      start_period: 30s
    ports:
      - 8787:8787
    environment:
      - MINDWTR_CLOUD_AUTH_TOKENS=${MINDWTR_CLOUD_AUTH_TOKENS:?MINDWTR_CLOUD_AUTH_TOKENS must be set}
      - MINDWTR_CLOUD_ALLOW_ANY_TOKEN=${MINDWTR_CLOUD_ALLOW_ANY_TOKEN:-false}
      - MINDWTR_CLOUD_CORS_ORIGIN=${MINDWTR_CLOUD_CORS_ORIGIN:-http://localhost:5173}
    volumes:
      - ./data:/app/cloud_data

  mindwtr-app:
    image: ghcr.io/dongdongbh/mindwtr-app:latest
    build:
      context: ..
      dockerfile: docker/app/Dockerfile
    container_name: mindwtr-app
    hostname: mindwtr-app
    restart: always
    cpus: "1.0"
    mem_limit: 512m
    depends_on:
      mindwtr-cloud:
        condition: service_healthy
    ports:
      - 5173:5173

  ai-service:
    build:
      context: ..
      dockerfile: docker/ai-service/Dockerfile
    container_name: ai-service
    hostname: ai-service
    restart: always
    cpus: "1.0"
    mem_limit: 512m
    depends_on:
      mindwtr-cloud:
        condition: service_healthy
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:?TELEGRAM_BOT_TOKEN must be set}
      - MINDWTR_CLOUD_URL=http://mindwtr-cloud:8787
      - MINDWTR_AUTH_TOKEN=${MINDWTR_CLOUD_AUTH_TOKENS}
      - LLM_BASE_URL=${LLM_BASE_URL:-}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-cc/claude-opus-4-6}
      - SLACK_APP_TOKEN=${SLACK_APP_TOKEN:-}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN:-}
      - NOTION_API_KEY=${NOTION_API_KEY:-}
      - NOTION_DATABASE_ID=${NOTION_DATABASE_ID:-}
      - NOTION_POLL_INTERVAL_MS=${NOTION_POLL_INTERVAL_MS:-300000}
      - HTTP_PORT=${HTTP_PORT:-3030}
      - HTTP_AUTH_TOKEN=${HTTP_AUTH_TOKEN:-}
      - DATA_DIR=/app/data
    ports:
      - "${HTTP_PORT:-3030}:3030"
    volumes:
      - ./ai-service-data:/app/data
